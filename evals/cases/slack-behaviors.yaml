schema_version: "1.0"
name: App Slack Behavior Evals
description: Behavior-level Slack event evals focused on input/output contracts.

cases:

  - id: subscribed_skip
    description: Subscribed message can be skipped with no assistant post.
    behavior:
      subscribed_decisions:
        - should_reply: false
          reason: side conversation
    events:
      - type: subscribed_message
        thread:
          id: thread-skip
          channel_id: C-skip
          thread_ts: "1700000000.200"
        message:
          id: m-skip-1
          text: "thanks everyone"
          is_mention: false
          author:
            user_id: U-bob
            user_name: bob
            full_name: Bob Example
            is_me: false
    expected:
      posts_count: 0
      warning_events:
        - subscribed_message_reply_skipped

  - id: subscribed_explicit_mention_reply
    description: Explicit mention in subscribed thread forces a reply.
    events:
      - type: subscribed_message
        thread:
          id: thread-explicit
          channel_id: C-explicit
          thread_ts: "1700000000.300"
        message:
          id: m-explicit-1
          text: "<@U_APP> can you draft a response?"
          is_mention: true
          author:
            user_id: U-cara
            user_name: cara
            full_name: Cara Example
            is_me: false
    expected:
      posts_count: 1

  - id: multi_turn_continuity
    description: Two-turn flow keeps enough continuity to answer a follow-up.
    events:
      - type: new_mention
        thread:
          id: thread-continuity
          channel_id: C-continuity
          thread_ts: "1700000000.400"
        message:
          id: m-continuity-1
          text: "I need the budget by Friday."
          is_mention: true
          author:
            user_id: U-dani
            user_name: dani
            full_name: Dani Example
            is_me: false
      - type: subscribed_message
        thread:
          id: thread-continuity
          channel_id: C-continuity
          thread_ts: "1700000000.400"
        message:
          id: m-continuity-2
          text: "what did i just ask?"
          is_mention: true
          author:
            user_id: U-dani
            user_name: dani
            full_name: Dani Example
            is_me: false
    expected:
      posts_count: 2

  - id: assistant_thread_init_metadata
    description: Assistant thread start sets title and suggested prompts.
    events:
      - type: assistant_thread_started
        thread:
          id: thread-init
          channel_id: C-init
          thread_ts: "1700000000.500"
        user_id: U-erin
    expected:
      posts_count: 0
      adapter_title_calls: 1
      adapter_prompt_calls: 1

  - id: handler_error_fallback
    description: Handler-level failures post a fallback message.
    behavior:
      fail_reply_call: 1
    events:
      - type: new_mention
        thread:
          id: thread-error
          channel_id: C-error
          thread_ts: "1700000000.600"
        message:
          id: m-error-1
          text: "<@U_APP> run this"
          is_mention: true
          author:
            user_id: U-finn
            user_name: finn
            full_name: Finn Example
            is_me: false
    expected:
      posts_count: 1
      exception_events:
        - mention_handler_failed

  - id: time_brief_skill_invocation
    description: Slash-invoked /time-brief uses the lightweight eval skill and returns current time.
    behavior:
      skill_dirs:
        - evals/skills
    events:
      - type: new_mention
        thread:
          id: thread-brief
          channel_id: C-brief
          thread_ts: "1700000000.700"
        message:
          id: m-brief-1
          text: "/time-brief candidate: David Cramer"
          is_mention: true
          author:
            user_id: U-grace
            user_name: grace
            full_name: Grace Example
            is_me: false
    expected:
      posts_count: 1
      tool_calls_include:
        - load_skill
        - system_time

  - id: time_brief_repeated_invocations
    description: Repeated /time-brief invocations in the same thread use the lightweight eval skill.
    behavior:
      skill_dirs:
        - evals/skills
    events:
      - type: new_mention
        thread:
          id: thread-sandbox-reuse
          channel_id: C-sandbox
          thread_ts: "1700000000.800"
        message:
          id: m-sandbox-1
          text: "/time-brief candidate: Alice Example"
          is_mention: true
          author:
            user_id: U-hank
            user_name: hank
            full_name: Hank Example
            is_me: false
      - type: subscribed_message
        thread:
          id: thread-sandbox-reuse
          channel_id: C-sandbox
          thread_ts: "1700000000.800"
        message:
          id: m-sandbox-2
          text: "/time-brief candidate: Bob Example"
          is_mention: true
          author:
            user_id: U-hank
            user_name: hank
            full_name: Hank Example
            is_me: false
    expected:
      posts_count: 2
      tool_calls_include:
        - load_skill
        - system_time

  - id: list_working_directory_skill_invocation
    description: Slash-invoked /list-working-directory uses bash in sandbox and returns working directory files.
    behavior:
      skill_dirs:
        - evals/skills
    events:
      - type: new_mention
        thread:
          id: thread-list-working-dir
          channel_id: C-list-working-dir
          thread_ts: "1700000001.000"
        message:
          id: m-list-working-dir-1
          text: "/list-working-directory"
          is_mention: true
          author:
            user_id: U-jules
            user_name: jules
            full_name: Jules Example
            is_me: false
    expected:
      posts_count: 1
      tool_calls_include:
        - load_skill
        - bash
      sandbox_id_present: true
      post_contains:
        - "Working directory files:"

  - id: provider_error_without_gateway_key
    description: Missing gateway API key returns provider_error and still posts a safe fallback response.
    behavior:
      unset_gateway_api_key: true
    events:
      - type: new_mention
        thread:
          id: thread-no-key
          channel_id: C-no-key
          thread_ts: "1700000000.900"
        message:
          id: m-no-key-1
          text: "summarize this quickly"
          is_mention: true
          author:
            user_id: U-ivan
            user_name: ivan
            full_name: Ivan Example
            is_me: false
    expected:
      posts_count: 1
      warning_events:
        - agent_turn_provider_error

  - id: capability_credential_smoke
    description: Eval skill can run a command while capability plumbing is enabled.
    behavior:
      skill_dirs:
        - evals/skills
      enable_test_credentials: true
      test_credential_token: eval-smoke-token
    events:
      - type: new_mention
        thread:
          id: thread-capability-credential
          channel_id: C-capability
          thread_ts: "1700000001.100"
        message:
          id: m-capability-1
          text: "/capability-credential-smoke"
          is_mention: true
          author:
            user_id: U-kai
            user_name: kai
            full_name: Kai Example
            is_me: false
    expected:
      posts_count: 1
      tool_calls_include:
        - bash
      post_contains:
        - "CREDENTIAL_OK"

  - id: set_default_repo_natural_language
    description: Natural language request sets provider default repo and later credential enablement succeeds without --repo.
    behavior:
      enable_test_credentials: true
      test_credential_token: eval-default-repo-token
    events:
      - type: new_mention
        thread:
          id: thread-default-repo
          channel_id: C-default-repo
          thread_ts: "1700000001.200"
        message:
          id: m-default-repo-1
          text: "Set the default repo to getsentry/junior for this channel."
          is_mention: true
          author:
            user_id: U-lara
            user_name: lara
            full_name: Lara Example
            is_me: false
      - type: subscribed_message
        thread:
          id: thread-default-repo
          channel_id: C-default-repo
          thread_ts: "1700000001.200"
        message:
          id: m-default-repo-2
          text: "Now enable github issues read credentials without passing --repo."
          is_mention: true
          author:
            user_id: U-lara
            user_name: lara
            full_name: Lara Example
            is_me: false
    expected:
      posts_count: 2
      tool_calls_include:
        - bash
      log_events:
        - jr_rpc_config_set
        - credential_issue_success
