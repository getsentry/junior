schema_version: "1.0"
name: App Slack Behavior Evals
description: Behavior-level Slack event evals focused on input/output contracts.

cases:

  - id: subscribed_skip
    description: Subscribed message can be skipped with no assistant post.
    behavior:
      subscribed_decisions:
        - should_reply: false
          reason: side conversation
    events:
      - type: subscribed_message
        thread:
          id: thread-skip
          channel_id: C-skip
          thread_ts: "1700000000.200"
        message:
          id: m-skip-1
          text: "thanks everyone"
          is_mention: false
          author:
            user_id: U-bob
            user_name: bob
            full_name: Bob Example
            is_me: false
    expected:
      posts_count: 0
      warning_events:
        - subscribed_message_reply_skipped

  - id: subscribed_explicit_mention_reply
    description: Explicit mention in subscribed thread forces a reply.
    events:
      - type: subscribed_message
        thread:
          id: thread-explicit
          channel_id: C-explicit
          thread_ts: "1700000000.300"
        message:
          id: m-explicit-1
          text: "<@U_APP> can you draft a response?"
          is_mention: true
          author:
            user_id: U-cara
            user_name: cara
            full_name: Cara Example
            is_me: false
    expected:
      posts_count: 1

  - id: multi_turn_continuity
    description: Two-turn flow keeps enough continuity to answer a follow-up.
    events:
      - type: new_mention
        thread:
          id: thread-continuity
          channel_id: C-continuity
          thread_ts: "1700000000.400"
        message:
          id: m-continuity-1
          text: "I need the budget by Friday."
          is_mention: true
          author:
            user_id: U-dani
            user_name: dani
            full_name: Dani Example
            is_me: false
      - type: subscribed_message
        thread:
          id: thread-continuity
          channel_id: C-continuity
          thread_ts: "1700000000.400"
        message:
          id: m-continuity-2
          text: "what did i just ask?"
          is_mention: true
          author:
            user_id: U-dani
            user_name: dani
            full_name: Dani Example
            is_me: false
    expected:
      posts_count: 2

  - id: assistant_thread_init_metadata
    description: Assistant thread start sets title and suggested prompts.
    events:
      - type: assistant_thread_started
        thread:
          id: thread-init
          channel_id: C-init
          thread_ts: "1700000000.500"
        user_id: U-erin
    expected:
      posts_count: 0
      adapter_title_calls: 1
      adapter_prompt_calls: 1

  - id: handler_error_fallback
    description: Handler-level failures post a fallback message.
    behavior:
      fail_reply_call: 1
    events:
      - type: new_mention
        thread:
          id: thread-error
          channel_id: C-error
          thread_ts: "1700000000.600"
        message:
          id: m-error-1
          text: "<@U_APP> run this"
          is_mention: true
          author:
            user_id: U-finn
            user_name: finn
            full_name: Finn Example
            is_me: false
    expected:
      posts_count: 1
      exception_events:
        - mention_handler_failed

  - id: brief_skill_invocation
    description: Slash-invoked /brief command is detected and routed through skill loading.
    events:
      - type: new_mention
        thread:
          id: thread-brief
          channel_id: C-brief
          thread_ts: "1700000000.700"
        message:
          id: m-brief-1
          text: "/brief candidate: David Cramer"
          is_mention: true
          author:
            user_id: U-grace
            user_name: grace
            full_name: Grace Example
            is_me: false
    expected:
      posts_count: 1
      sandbox_id_present: true
      log_events:
        - agent_turn_start
        - agent_turn_activity
      log_event_attributes:
        - event: agent_turn_start
          key: gen_ai.request.model
        - event: agent_turn_activity
          key: app.ai.tool_call_count

  - id: sandbox_id_reused_across_turns
    description: Sandbox ID persists and is reused for repeated skill invocations in the same thread.
    events:
      - type: new_mention
        thread:
          id: thread-sandbox-reuse
          channel_id: C-sandbox
          thread_ts: "1700000000.800"
        message:
          id: m-sandbox-1
          text: "/brief candidate: Alice Example"
          is_mention: true
          author:
            user_id: U-hank
            user_name: hank
            full_name: Hank Example
            is_me: false
      - type: subscribed_message
        thread:
          id: thread-sandbox-reuse
          channel_id: C-sandbox
          thread_ts: "1700000000.800"
        message:
          id: m-sandbox-2
          text: "/brief candidate: Bob Example"
          is_mention: true
          author:
            user_id: U-hank
            user_name: hank
            full_name: Hank Example
            is_me: false
    expected:
      posts_count: 2
      sandbox_ids_count: 2
      sandbox_ids_unique_count: 1

  - id: provider_error_without_gateway_key
    description: Missing gateway API key returns provider_error and still posts a safe fallback response.
    behavior:
      unset_gateway_api_key: true
    events:
      - type: new_mention
        thread:
          id: thread-no-key
          channel_id: C-no-key
          thread_ts: "1700000000.900"
        message:
          id: m-no-key-1
          text: "summarize this quickly"
          is_mention: true
          author:
            user_id: U-ivan
            user_name: ivan
            full_name: Ivan Example
            is_me: false
    expected:
      posts_count: 1
      warning_events:
        - agent_turn_provider_error
