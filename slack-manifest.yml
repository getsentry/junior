display_information:
  name: junior
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: junior
    always_online: true
  slash_commands:
    - command: /jr
      url: https://example.com/api/webhooks/slack
      description: Manage provider account linking
      usage_hint: "[link|unlink] [provider]"
oauth_config:
  scopes:
    bot:
      - assistant:write
      - app_mentions:read
      - canvases:read
      - canvases:write
      - commands
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - lists:read
      - lists:write
      - mpim:history
      - mpim:read
      - reactions:read
      - reactions:write
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    request_url: https://example.com/api/webhooks/slack
    bot_events:
      - app_home_opened
      - assistant_thread_started
      - assistant_thread_context_changed
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
    request_url: https://example.com/api/webhooks/slack
  socket_mode_enabled: false
