name: notion
description: Notion page search and summarization

capabilities:
  - api.read

credentials:
  type: oauth-bearer
  api-domains:
    - api.notion.com
  api-headers:
    Notion-Version: "2025-09-03"
  auth-token-env: NOTION_TOKEN
  auth-token-placeholder: host_managed_credential

oauth:
  client-id-env: NOTION_CLIENT_ID
  client-secret-env: NOTION_CLIENT_SECRET
  authorize-endpoint: https://api.notion.com/v1/oauth/authorize
  token-endpoint: https://api.notion.com/v1/oauth/token
  authorize-params:
    owner: user
  token-auth-method: basic
  token-extra-headers:
    Content-Type: application/json
